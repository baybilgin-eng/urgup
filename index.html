<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Ürgüp Gezi Rehberi · Ürgüp Travel Guide</title>
<meta name="description" content="Ürgüp ve çevresindeki kaya kiliseleri, camiler, türbeler, yeraltı tünelleri ve vadiler için harita merkezli gezi rehberi. A map-based travel guide to Ürgüp's rock churches, mosques, tombs, underground tunnels and valleys.">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--ink:#1E1916;--ink-soft:#2A231F;--bone:#F3EBE2;--muted:#A89A8D;
    --hair:rgba(243,235,226,.10);--hair-s:rgba(243,235,226,.18);--amber:#E8895C;--amber-lit:#F2A972;
    --shadow:0 -16px 40px rgba(0,0,0,.34);--display:"Fraunces",Georgia,serif;
    --ui:"Plus Jakarta Sans",system-ui,sans-serif;--sheet-peek:46vh;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;overflow:hidden}
  body{font-family:var(--ui);background:var(--ink);color:var(--bone);overscroll-behavior:none}
  #map{position:fixed;inset:0;z-index:1;background:#e8e2d8}
  .leaflet-control-attribution{font-family:var(--ui);font-size:10px}
  .pin{width:24px;height:24px;border-radius:50% 50% 50% 2px;transform:rotate(45deg);
    border:2px solid var(--bone);box-shadow:0 3px 8px rgba(0,0,0,.4);transition:transform .25s cubic-bezier(.3,1.4,.5,1)}
  .pin::after{content:"";position:absolute;inset:0;margin:auto;width:6px;height:6px;border-radius:50%;
    background:rgba(255,255,255,.92);transform:rotate(-45deg)}
  .pin.active{transform:rotate(45deg) scale(1.42);z-index:999;border-color:var(--amber)}
  .pin.dim{opacity:.28}
  @keyframes ping{0%{box-shadow:0 0 0 0 rgba(232,137,92,.55)}100%{box-shadow:0 0 0 22px rgba(232,137,92,0)}}
  .pin.ping{animation:ping 1.1s ease-out 2}

  .topbar{position:fixed;top:0;left:0;right:0;z-index:20;display:flex;align-items:flex-start;
    justify-content:space-between;padding:calc(env(safe-area-inset-top) + 12px) 16px 14px;
    background:linear-gradient(180deg,rgba(30,25,22,.94),rgba(30,25,22,.5) 70%,transparent);
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
  .brand{display:flex;flex-direction:column;line-height:1}
  .brand .eyebrow{font-size:10.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--amber);font-weight:600}
  .brand h1{margin:4px 0 0;font-family:var(--display);font-weight:500;font-size:22px;letter-spacing:-.01em}
  .brand .sub{font-size:11px;color:var(--muted);margin-top:3px;max-width:62vw}
  .top-actions{display:flex;align-items:center;gap:8px}
  .iconbtn{width:34px;height:34px;border-radius:50%;border:1px solid var(--hair-s);background:rgba(0,0,0,.2);
    color:var(--bone);font-family:var(--display);font-size:15px;font-style:italic;cursor:pointer;display:grid;place-items:center}
  .lang{display:flex;border:1px solid var(--hair-s);border-radius:999px;overflow:hidden;background:rgba(0,0,0,.2)}
  .lang button{font-family:var(--ui);font-size:12px;font-weight:700;border:0;background:transparent;
    color:var(--muted);padding:7px 11px;cursor:pointer;transition:.15s}
  .lang button.on{background:var(--bone);color:var(--ink)}

  .fab{position:fixed;right:16px;z-index:25;bottom:calc(var(--sheet-peek) + 18px);display:flex;align-items:center;
    gap:8px;padding:11px 16px 11px 13px;border:0;border-radius:999px;background:var(--amber);color:#2a1505;
    font-family:var(--ui);font-weight:700;font-size:13.5px;box-shadow:0 6px 20px rgba(232,137,92,.45);cursor:pointer;
    transition:transform .15s,bottom .35s cubic-bezier(.2,.8,.2,1)}
  .fab:active{transform:scale(.94)} .fab svg{width:17px;height:17px}

  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:22;height:var(--sheet-peek);background:var(--ink);
    border-radius:22px 22px 0 0;box-shadow:var(--shadow);display:flex;flex-direction:column;
    transition:height .38s cubic-bezier(.2,.85,.25,1);touch-action:none}
  .sheet.expanded{height:90vh}
  .handle-zone{padding:9px 0 6px;cursor:grab;flex:0 0 auto}
  .handle{width:38px;height:4px;border-radius:99px;background:var(--hair-s);margin:0 auto}
  .sheet-head{flex:0 0 auto;padding:2px 20px 10px}
  .sheet-head .row{display:flex;align-items:baseline;justify-content:space-between}
  .sheet-head h2{margin:0;font-family:var(--display);font-weight:500;font-size:18px}
  .sheet-head .meta{font-size:12px;color:var(--muted);font-weight:500}
  .sheet-head .meta b{color:var(--amber);font-weight:700}
  .filters{display:flex;gap:7px;overflow-x:auto;padding:10px 0 4px;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .filt{flex:0 0 auto;font-size:12px;font-weight:600;border:1px solid var(--hair-s);background:transparent;
    color:var(--muted);padding:6px 12px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:.15s;
    display:flex;align-items:center;gap:6px}
  .filt .dot{width:7px;height:7px;border-radius:50%}
  .filt.on{background:var(--bone);color:var(--ink);border-color:var(--bone)}

  .list{flex:1 1 auto;overflow-y:auto;padding:6px 12px calc(env(safe-area-inset-bottom) + 12px);
    border-top:1px solid var(--hair);-webkit-overflow-scrolling:touch}
  .card{display:flex;gap:13px;align-items:center;padding:9px;border-radius:16px;cursor:pointer;transition:background .15s}
  .card:active{background:var(--ink-soft)} .card.active{background:var(--ink-soft);box-shadow:inset 0 0 0 1px var(--hair-s)}
  .thumb{flex:0 0 64px;width:64px;height:64px;border-radius:13px;overflow:hidden;background:var(--ink-soft);position:relative}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .thumb .tag{position:absolute;left:0;top:0;width:4px;height:100%}
  .card-body{flex:1 1 auto;min-width:0}
  .card-body .name{font-family:var(--display);font-weight:500;font-size:15.5px;margin:0 0 4px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-row{display:flex;align-items:center;gap:9px}
  .chip{font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:999px;color:var(--bone);white-space:nowrap}
  .dist{font-size:12.5px;font-weight:700;color:var(--amber);display:flex;align-items:center;gap:4px}
  .dist svg{width:11px;height:11px}
  .chev{flex:0 0 auto;color:var(--muted);opacity:.5}
  .credit{margin:8px 6px 4px;padding-top:12px;border-top:1px solid var(--hair);
    font-size:11.5px;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
  .credit a{color:var(--muted);text-decoration:none;border-bottom:1px solid var(--hair-s)}

  .sheetcard{position:fixed;left:0;right:0;bottom:0;z-index:40;background:var(--ink);border-radius:22px 22px 0 0;
    box-shadow:var(--shadow);transform:translateY(101%);transition:transform .42s cubic-bezier(.2,.85,.25,1);
    display:flex;flex-direction:column;overflow:hidden}
  .sheetcard.open{transform:translateY(0)}
  .detail{height:94vh} .about{height:auto;max-height:86vh}
  .detail-hero{flex:0 0 auto;height:40vh;position:relative;background:var(--ink-soft)}
  .detail-hero img{width:100%;height:100%;object-fit:cover;display:block}
  .detail-hero::after{content:"";position:absolute;left:0;right:0;bottom:0;height:60%;background:linear-gradient(transparent,var(--ink))}
  .x{position:absolute;top:calc(env(safe-area-inset-top) + 10px);right:14px;z-index:3;width:38px;height:38px;
    border-radius:50%;border:0;background:rgba(30,25,22,.55);backdrop-filter:blur(8px);color:var(--bone);
    cursor:pointer;display:grid;place-items:center}
  .detail-body{flex:1 1 auto;overflow-y:auto;padding:0 22px calc(env(safe-area-inset-bottom) + 104px);
    margin-top:-46px;position:relative;z-index:2}
  .detail-body .chip{display:inline-block;margin-bottom:11px}
  .detail-body h2{font-family:var(--display);font-weight:500;font-size:27px;line-height:1.12;margin:0 0 12px;letter-spacing:-.015em}
  .factbar{display:flex;flex-wrap:wrap;gap:8px 18px;margin-bottom:6px;padding-bottom:16px;border-bottom:1px solid var(--hair)}
  .fact{display:flex;flex-direction:column;gap:2px}
  .fact .k{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .fact .v{font-size:13.5px;font-weight:600}
  .detail-dist{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--amber);margin:16px 0 14px}
  .detail-dist svg{width:13px;height:13px}
  .detail-body p{color:var(--bone);opacity:.82;line-height:1.66;font-size:15px;margin:0}
  .note{margin-top:16px;padding:13px 15px;border-radius:13px;background:rgba(232,137,92,.10);
    border:1px solid rgba(232,137,92,.28);font-size:13px;line-height:1.5;color:var(--amber-lit)}
  .note b{color:var(--amber)}
  .detail-actions{position:absolute;left:0;right:0;bottom:0;z-index:3;
    padding:14px 22px calc(env(safe-area-inset-bottom) + 16px);background:linear-gradient(transparent,var(--ink) 32%);display:flex;gap:10px}
  .btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;border:0;border-radius:14px;
    cursor:pointer;font-family:var(--ui);font-weight:700;font-size:15px;padding:15px}
  .btn-primary{background:var(--amber);color:#2a1505} .btn-primary:active{background:var(--amber-lit)} .btn svg{width:18px;height:18px}

  .about-inner{padding:28px 24px calc(env(safe-area-inset-bottom) + 28px);overflow-y:auto}
  .about-inner .eyebrow{font-size:10.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--amber);font-weight:600}
  .about-inner h2{font-family:var(--display);font-weight:500;font-size:25px;margin:8px 0 14px}
  .about-inner p.intro{color:var(--bone);opacity:.82;line-height:1.6;font-size:14.5px;margin:0 0 22px}
  .about-block{padding:13px 0;border-top:1px solid var(--hair);display:flex;flex-direction:column;gap:3px}
  .about-block .k{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .about-block .v{font-size:16px;font-weight:600;font-family:var(--display)}
  .about-block a.v{color:var(--amber);text-decoration:none}
  .rights{margin-top:22px;padding-top:16px;border-top:1px solid var(--hair);font-size:12px;color:var(--muted);line-height:1.5}

  .geo-note{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(var(--sheet-peek) + 70px);z-index:30;
    background:var(--ink-soft);color:var(--muted);font-size:11.5px;padding:7px 13px;border-radius:999px;
    border:1px solid var(--hair);opacity:0;transition:opacity .4s;pointer-events:none;max-width:80vw;text-align:center}
  .geo-note.show{opacity:1}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  @media (min-width:720px){.sheet,.sheetcard{left:50%;width:460px;transform:translateX(-50%)}
    .sheetcard{transform:translate(-50%,101%)} .sheetcard.open{transform:translate(-50%,0)}
    .fab{right:calc(50% - 230px + 16px)} .brand .sub{max-width:300px}}
</style>
</head>
<body>
<div id="map"></div>

<header class="topbar">
  <div class="brand">
    <span class="eyebrow">Kapadokya · Ürgüp</span>
    <h1 data-i="title">Ürgüp Gezi Rehberi</h1>
    <span class="sub" data-i="sub">Antik mühendislerin izinde — 17 durak</span>
  </div>
  <div class="top-actions">
    <button class="iconbtn" onclick="openAbout()" aria-label="Hakkında / About">i</button>
    <div class="lang"><button id="L_tr" class="on" onclick="setLang('tr')">TR</button><button id="L_en" onclick="setLang('en')">EN</button></div>
  </div>
</header>

<button class="fab" onclick="goNearest()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg>
  <span data-i="nearest">En yakın durak</span>
</button>
<div class="geo-note" id="geoNote"></div>

<section class="sheet" id="sheet">
  <div class="handle-zone" id="handleZone"><div class="handle"></div></div>
  <div class="sheet-head">
    <div class="row"><h2 data-i="stops">Duraklar</h2><span class="meta" id="meta"></span></div>
    <div class="filters" id="filters"></div>
  </div>
  <div class="list" id="list"></div>
</section>

<section class="sheetcard detail" id="detail">
  <div class="detail-hero"><button class="x" onclick="closeCard('detail')"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button><img id="dImg" alt=""></div>
  <div class="detail-body">
    <span class="chip" id="dChip"></span>
    <h2 id="dName"></h2>
    <div class="factbar" id="dFacts"></div>
    <div class="detail-dist"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 21s-7-6.3-7-11a7 7 0 0 1 14 0c0 4.7-7 11-7 11z"/><circle cx="12" cy="10" r="2.4"/></svg><span id="dDist"></span></div>
    <p id="dDesc"></p>
    <div class="note" id="dNote" style="display:none"></div>
  </div>
  <div class="detail-actions"><a class="btn btn-primary" id="dDir" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.7 11.3 12.7 2.3a1 1 0 0 0-1.4 0l-9 9a1 1 0 0 0 0 1.4l9 9a1 1 0 0 0 1.4 0l9-9a1 1 0 0 0 0-1.4z"/><path d="M9 13v-2a2 2 0 0 1 2-2h4"/><path d="m13 7 2 2-2 2"/></svg><span data-i="directions">Yol tarifi al</span></a></div>
</section>

<section class="sheetcard about" id="about">
  <div class="about-inner">
    <button class="x" onclick="closeCard('about')"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    <span class="eyebrow">Kapadokya · Ürgüp</span>
    <h2 data-i="about_title">Hakkında</h2>
    <p class="intro" data-i="about_intro"></p>
    <div class="about-block"><span class="k" data-i="about_by">Hazırlayan</span><span class="v" id="aAuthor"></span></div>
    <div class="about-block"><span class="k" data-i="about_contact">İletişim</span><a class="v" id="aEmail"></a></div>
    <p class="rights" id="aRights"></p>
  </div>
</section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="data.js"></script>
<script>
const CATS=window.CATS,POINTS=window.POINTS,CONTACT=window.CONTACT;
const URGUP=[38.6315,34.9075];
let lang="tr",user={lat:URGUP[0],lng:URGUP[1]},markers={},activeId=null,filter="all";

const I18N={
 tr:{title:"Ürgüp Gezi Rehberi",sub:"Antik mühendislerin izinde — 17 durak",stops:"Duraklar",
     metasuf:"nokta · mesafeye göre",nearest:"En yakın durak",directions:"Yol tarifi al",away:"uzaklıkta",
     all:"Tümü",period:"Dönem",access:"Erişim",note:"Not.",
     geo:"Konum alınamadı — mesafeler Ürgüp merkez baz alınarak gösteriliyor.",
     about_title:"Hakkında",about_intro:"Ürgüp ve yakın çevresindeki 17 tarihî ve doğal durağı harita üzerinden keşfetmeniz için hazırlanmış bir gezi rehberidir.",
     about_by:"Hazırlayan",about_contact:"İletişim",rights:CONTACT.rights_tr},
 en:{title:"Ürgüp Travel Guide",sub:"In the footsteps of ancient engineers — 17 sites",stops:"Sites",
     metasuf:"places · by distance",nearest:"Nearest site",directions:"Get directions",away:"away",
     all:"All",period:"Period",access:"Access",note:"Note.",
     geo:"Location unavailable — distances shown from Ürgüp centre.",
     about_title:"About",about_intro:"A travel guide for exploring 17 historical and natural sites in and around Ürgüp directly on the map.",
     about_by:"Created by",about_contact:"Contact",rights:CONTACT.rights_en}
};
const t=k=>I18N[lang][k];
const nm=p=>lang==="en"&&p.name_en?p.name_en:p.name;
const ds=p=>lang==="en"&&p.desc_en?p.desc_en:p.desc;
const nt=p=>lang==="en"?p.note_en:p.note;
const er=p=>lang==="en"&&p.erisim_en?p.erisim_en:p.erisim;
const tr=p=>lang==="en"&&p.tarih_en?p.tarih_en:p.tarih;
const cl=c=>lang==="en"?CATS[c].label_en:CATS[c].label;

const map=L.map('map',{zoomControl:false}).setView(URGUP,14);
L.control.zoom({position:'bottomleft'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
 {attribution:'&copy; OpenStreetMap &copy; CARTO',maxZoom:19,subdomains:'abcd'}).addTo(map);

function hav(a,b,c,d){const R=6371,t=Math.PI/180,p=(c-a)*t,q=(d-b)*t;
 const x=Math.sin(p/2)**2+Math.cos(a*t)*Math.cos(c*t)*Math.sin(q/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));}
function fmt(km){if(km<1)return Math.round(km*1000)+" m";
 let s=km.toFixed(1);return (lang==="tr"?s.replace(".",","):s)+" km";}

POINTS.forEach(p=>{
 const m=L.marker([p.lat,p.lng],{icon:L.divIcon({className:'',
   html:`<div class="pin" data-id="${p.id}" style="background:${CATS[p.cat].color}"></div>`,
   iconSize:[24,24],iconAnchor:[12,22]})}).addTo(map);
 m.on('click',()=>select(p.id,true));markers[p.id]=m;});
map.fitBounds(POINTS.map(p=>[p.lat,p.lng]),{padding:[60,60]});

function buildFilters(){
 const used=[...new Set(POINTS.map(p=>p.cat))],order=Object.keys(CATS).filter(k=>used.includes(k));
 let h=`<button class="filt ${filter==='all'?'on':''}" data-f="all" onclick="setFilter('all')">${t('all')}</button>`;
 order.forEach(k=>{h+=`<button class="filt ${filter===k?'on':''}" data-f="${k}" onclick="setFilter('${k}')"><span class="dot" style="background:${CATS[k].color}"></span>${cl(k)}</button>`;});
 document.getElementById('filters').innerHTML=h;}
function setFilter(f){filter=f;
 document.querySelectorAll('.filt').forEach(b=>b.classList.toggle('on',b.dataset.f===f));
 POINTS.forEach(p=>{const e=document.querySelector(`.pin[data-id="${p.id}"]`);if(e)e.classList.toggle('dim',f!=="all"&&p.cat!==f);});
 renderList();}

function withDist(){let a=POINTS.map(p=>({...p,d:hav(user.lat,user.lng,p.lat,p.lng)}));
 if(filter!=="all")a=a.filter(p=>p.cat===filter);return a.sort((x,y)=>x.d-y.d);}
function renderList(){const a=withDist();
 document.getElementById('meta').innerHTML=`<b>${a.length}</b> ${t('metasuf')}`;
 document.getElementById('list').innerHTML=a.map(p=>`
  <div class="card ${p.id===activeId?'active':''}" onclick="select(${p.id},true)">
   <div class="thumb"><span class="tag" style="background:${CATS[p.cat].color}"></span><img loading="lazy" src="${p.thumb}" alt="${nm(p)}"></div>
   <div class="card-body"><p class="name">${nm(p)}</p>
    <div class="card-row"><span class="chip" style="background:${CATS[p.cat].color}">${cl(p.cat)}</span>
     <span class="dist"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 21s-7-6.3-7-11a7 7 0 0 1 14 0c0 4.7-7 11-7 11z"/><circle cx="12" cy="10" r="2.4"/></svg>${fmt(p.d)}</span></div></div>
   <span class="chev"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg></span>
  </div>`).join('')
  +`<div class="credit"><span>© ${CONTACT.author}</span><a href="#" onclick="openAbout();return false;" data-i="about_title">Hakkında</a></div>`;}

function setActive(id){document.querySelectorAll('.pin').forEach(e=>e.classList.remove('active','ping'));
 const e=document.querySelector(`.pin[data-id="${id}"]`);if(e)e.classList.add('active');}
function select(id,fly){activeId=id;const p=POINTS.find(x=>x.id===id);
 setActive(id);renderList();if(fly)map.flyTo([p.lat,p.lng],16,{duration:.8});openDetail(p);}
function openDetail(p){const d=hav(user.lat,user.lng,p.lat,p.lng);
 document.getElementById('dImg').src=p.img;
 const ch=document.getElementById('dChip');ch.textContent=cl(p.cat);ch.style.background=CATS[p.cat].color;
 document.getElementById('dName').textContent=nm(p);
 let f="";if(tr(p))f+=`<div class="fact"><span class="k">${t('period')}</span><span class="v">${tr(p)}</span></div>`;
 if(er(p))f+=`<div class="fact"><span class="k">${t('access')}</span><span class="v">${er(p)}</span></div>`;
 document.getElementById('dFacts').innerHTML=f;
 document.getElementById('dDist').textContent=fmt(d)+" "+t('away');
 document.getElementById('dDesc').textContent=ds(p);
 const n=document.getElementById('dNote'),nv=nt(p);
 if(nv){n.style.display='block';n.innerHTML=`<b>${t('note')}</b> ${nv.replace(/^(Önemli Not:|Important note:)\s*/i,'')}`;}else n.style.display='none';
 document.getElementById('dDir').href=`https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}`;
 openCard('detail');}
function goNearest(){const n=withDist()[0];if(!n)return;map.flyTo([n.lat,n.lng],16,{duration:.9});
 select(n.id,false);const e=document.querySelector(`.pin[data-id="${n.id}"]`);if(e)e.classList.add('ping');}

function openCard(id){document.getElementById(id).classList.add('open');}
function closeCard(id){document.getElementById(id).classList.remove('open');}
function openAbout(){
 document.getElementById('aAuthor').textContent=CONTACT.author;
 const em=document.getElementById('aEmail');em.textContent=CONTACT.email;em.href="mailto:"+CONTACT.email;
 document.getElementById('aRights').textContent=t('rights');openCard('about');}

function setLang(l){lang=l;document.documentElement.lang=l;
 document.getElementById('L_tr').classList.toggle('on',l==='tr');
 document.getElementById('L_en').classList.toggle('on',l==='en');
 document.querySelectorAll('[data-i]').forEach(e=>{const k=e.getAttribute('data-i');if(I18N[l][k]!==undefined)e.textContent=I18N[l][k];});
 buildFilters();renderList();
 if(activeId&&document.getElementById('detail').classList.contains('open'))openDetail(POINTS.find(x=>x.id===activeId));
 if(document.getElementById('about').classList.contains('open'))openAbout();}

// sheet drag
const sheet=document.getElementById('sheet'),hz=document.getElementById('handleZone');let dy=null,sh=0;
function fabBottom(){document.querySelector('.fab').style.bottom=sheet.classList.contains('expanded')?'90vh':'calc(46vh + 18px)';}
hz.addEventListener('pointerdown',e=>{dy=e.clientY;sh=sheet.offsetHeight;hz.setPointerCapture(e.pointerId);});
hz.addEventListener('pointermove',e=>{if(dy===null)return;const h=sh+(dy-e.clientY);
 sheet.style.transition='none';sheet.style.height=Math.max(innerHeight*.2,Math.min(innerHeight*.9,h))+'px';});
hz.addEventListener('pointerup',e=>{if(dy===null)return;const mv=dy-e.clientY;sheet.style.transition='';sheet.style.height='';
 if(Math.abs(mv)<6)sheet.classList.toggle('expanded');else if(mv>0)sheet.classList.add('expanded');else sheet.classList.remove('expanded');
 dy=null;fabBottom();});

// geolocation
function note(m){const n=document.getElementById('geoNote');n.textContent=m;n.classList.add('show');setTimeout(()=>n.classList.remove('show'),3800);}
let um=null;
if(navigator.geolocation){navigator.geolocation.getCurrentPosition(
  p=>{user={lat:p.coords.latitude,lng:p.coords.longitude};if(um)map.removeLayer(um);
    um=L.circleMarker([user.lat,user.lng],{radius:7,color:'#fff',weight:2,fillColor:'#4C8BF5',fillOpacity:1}).addTo(map);renderList();},
  ()=>note(t('geo')),{timeout:6000});}

setLang('tr');fabBottom();
</script>
</body>
</html>
